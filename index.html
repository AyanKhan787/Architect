<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <div class="image-section">
            <video src="moves.mp4" autoplay muted loop playsinline class="bg-video"></video>
        </div>
        <div class="login-section">
            <div class="page-title">ARCHITECT</div>
            <form>
                <h1>Studio Access</h1>
            <p>Enter your credentials to access the secure portal. </p>
                <label for="Email">IDENTIFICATION</label>
                <input type="email" placeholder="name@email.com">
                <label for="email">SECURITY KEY</label>
                <input type="password" placeholder="*******">
                <a href="#">Reset Key</a>
                <button>AUTHORIZE</button>
                <div class="separator"></div>
                <p id="permission">External collaborator?</p>
                <button id="permit">REQUEST ACCESS PERMIT</button>
            </form>
            <div id="last-text">Sis Version 4.2</div>
            <div id="last-text-protocol">RESTRICTED SECURE PROTOCOL</div>
        </div>
    </div>
</body>
</html>
